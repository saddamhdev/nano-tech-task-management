spring:
  application:
    name: rabbitmq-service

  # Database Configuration
  datasource:
    url: jdbc:h2:mem:rabbitmqdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  # RabbitMQ Configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
    template:
      default-receive-queue: rabbitmq-event-queue
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 1.5

# Custom Configuration
rabbitmq:
  queue:
    name: rabbitmq-event-queue
  exchange:
    name: rabbitmq-event-exchange
  routing:
    key: rabbitmq-event-routing-key
  dlq:
    queue:
      name: rabbitmq-event-dlq
    exchange:
      name: rabbitmq-event-dlq-exchange
    routing:
      key: rabbitmq-event-dlq-routing-key

# Server Configuration
server:
  port: 8098

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Logging Configuration
logging:
  level:
    root: INFO
    snvn.rabbitmqservice: DEBUG
    org.springframework.amqp: INFO
    com.rabbitmq: WARN

  file:
    name: logs/${spring.application.name}.log

  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 2GB

  pattern:
    console: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}",
       "level":"%level",
       "service":"${spring.application.name}",
       "thread":"%thread",
       "traceId":"%X{traceId:-}",
       "spanId":"%X{spanId:-}",
       "correlationId":"%X{correlationId:-}",
       "jobId":"%X{jobId:-}",
       "logger":"%logger{36}",
       "message":"%msg",
       "exception":"%replace(%ex){'\n','\\\\n'}"}%n

    file: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}",
       "level":"%level",
       "service":"${spring.application.name}",
       "thread":"%thread",
       "traceId":"%X{traceId:-}",
       "spanId":"%X{spanId:-}",
       "correlationId":"%X{correlationId:-}",
       "jobId":"%X{jobId:-}",
       "logger":"%logger{36}",
       "message":"%msg",
       "exception":"%replace(%ex){'\n','\\\\n'}"}%n

