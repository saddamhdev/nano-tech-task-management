spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: kafka-event-group-test
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: 1
      retries: 1

kafka-service-log:
  enabled: true
  auto-startup: true
  bootstrap-servers: ${spring.kafka.bootstrap-servers:localhost:9092}
  topic: kafka-log-topic-test
  group-id: kafka-log-group-test
  source: ${spring.application.name:kafka-service}
  index: main
  sourcetype: _json
  logfileEnabled: false
  splunkEnabled: false

kafka:
  topic:
    name: kafka-event-topic-test

