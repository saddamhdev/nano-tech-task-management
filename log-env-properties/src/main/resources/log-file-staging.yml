log-file:
  enabled: true
  index: main
  source: ${spring.application.name:spring-boot}
  sourcetype: _json
  splunk-file: logs/${spring.application.name}.log


logging:
  level:
    root: INFO
    snvn: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

  file:
    name: logs/${spring.application.name}.log

  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 2GB

  pattern:
    console: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}",
       "level":"%level",
       "service":"${spring.application.name}",
       "thread":"%thread",
       "traceId":"%X{traceId:-}",
       "spanId":"%X{spanId:-}",
       "correlationId":"%X{correlationId:-}",
       "jobId":"%X{jobId:-}",
       "logger":"%logger{36}",
       "message":"%msg",
       "exception":"%replace(%ex){'\n','\\\\n'}"}%n

    file: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}",
       "level":"%level",
       "service":"${spring.application.name}",
       "thread":"%thread",
       "traceId":"%X{traceId:-}",
       "spanId":"%X{spanId:-}",
       "correlationId":"%X{correlationId:-}",
       "jobId":"%X{jobId:-}",
       "logger":"%logger{36}",
       "message":"%msg",
       "exception":"%replace(%ex){'\n','\\\\n'}"}%n