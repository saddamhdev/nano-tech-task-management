spring:
  application:
    name: gateway-service
  config:
    import:
      - "optional:classpath:log-file-prod.yml"
      - "optional:classpath:splunk-hec-prod.yml"
      - "optional:classpath:application-rabbitmq-prod.yml"
      - "optional:classpath:application-kafka-prod.yml"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:6062/realms/snvn

  cloud:
    gateway:
      routes:
        - id: user-service-route
          uri: https://user-service.yourdomain.com
          predicates:
            - Path=/api/users/**
          filters:
            - AddRequestHeader=X-Service, user-service
            - CircuitBreaker=userServiceCB

        - id: auth-service-route
          uri: https://auth-service.yourdomain.com
          predicates:
            - Path=/api/auth/**
          filters:
            - AddRequestHeader=X-Service, auth-service
            - CircuitBreaker=authServiceCB

        - id: account-service-route
          uri: https://account-service.yourdomain.com
          predicates:
            - Path=/api/accounts/**
          filters:
            - AddRequestHeader=X-Service, account-service
            - CircuitBreaker=accountServiceCB

        - id: transaction-service-route
          uri: https://transaction-service.yourdomain.com
          predicates:
            - Path=/api/transactions/**
          filters:
            - AddRequestHeader=X-Service, transaction-service
            - CircuitBreaker=transactionServiceCB

        - id: notification-service-route
          uri: https://notification-service.yourdomain.com
          predicates:
            - Path=/api/notifications/**
          filters:
            - AddRequestHeader=X-Service, notification-service
            - CircuitBreaker=notificationServiceCB

        - id: audit-service-route
          uri: https://audit-service.yourdomain.com
          predicates:
            - Path=/api/audit/**
          filters:
            - AddRequestHeader=X-Service, audit-service
            - CircuitBreaker=auditServiceCB

        - id: kafka-service-route
          uri: https://kafka-service.yourdomain.com
          predicates:
            - Path=/api/kafka/**
          filters:
            - AddRequestHeader=X-Service, kafka-service
            - CircuitBreaker=kafkaServiceCB

        - id: rabbitmq-service-route
          uri: https://rabbitmq-service.yourdomain.com
          predicates:
            - Path=/api/rabbitmq/**
          filters:
            - AddRequestHeader=X-Service, rabbitmq-service
            - CircuitBreaker=rabbitmqServiceCB

        - id: task-management-service-route
          uri: https://task-management-service.yourdomain.com
          predicates:
            - Path=/api/tasks/**
          filters:
            - AddRequestHeader=X-Service, task-management-service
            - CircuitBreaker=taskManagementServiceCB

        - id: config-service-route
          uri: https://config-service.yourdomain.com
          predicates:
            - Path=/config/**
          filters:
            - AddRequestHeader=X-Service, config-service
            - CircuitBreaker=configServiceCB

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "https://yourdomain.com,https://www.yourdomain.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 86400

server:
  port: 8093
  servlet:
    context-path: /gateway
  compression:
    enabled: true
    min-response-size: 1024
  ssl:
    enabled: true
    key-store: ${SSL_KEYSTORE_PATH}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://eureka-cluster:8761/eureka/
  instance:
    prefer-ip-address: false
    hostname: gateway-service.yourdomain.com

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# Environment: Production
logging:
  level:
    root: ERROR
    snvn: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/gateway-service/application.log
    max-size: 100MB
    max-history: 30

# Resilience4j Configuration (must be at root level, not under spring)
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10000
        failureRateThreshold: 70
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 30000
    instances:
      userServiceCB:
        baseConfig: default
      authServiceCB:
        baseConfig: default
      accountServiceCB:
        baseConfig: default
      transactionServiceCB:
        baseConfig: default
      notificationServiceCB:
        baseConfig: default
      auditServiceCB:
        baseConfig: default
      kafkaServiceCB:
        baseConfig: default
      rabbitmqServiceCB:
        baseConfig: default
      configServiceCB:
        baseConfig: default
      taskManagementServiceCB:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 30s
        cancelRunningFuture: true
    instances:
      userServiceCB:
        baseConfig: default
      authServiceCB:
        baseConfig: default
      accountServiceCB:
        baseConfig: default
      transactionServiceCB:
        baseConfig: default
      notificationServiceCB:
        baseConfig: default
      auditServiceCB:
        baseConfig: default
      kafkaServiceCB:
        baseConfig: default
      rabbitmqServiceCB:
        baseConfig: default
      configServiceCB:
        baseConfig: default
      taskManagementServiceCB:
        baseConfig: default

service-log:
  logfile:
    enabled: true
  splunk:
    enabled: true
  rabbitmq:
    enabled: true

rabbitmq-service-log:
  auto-startup: false


security:
  keycloak:
    enabled: true

  api-key:
    enabled: true
    header: X-API-KEY
    value: my-secret-key

  rate-limit:
    enabled: true
    requests-per-minute: 2

  ip-filter:
    enabled: false



incoming-ip-whitelist:
  destinations:
    - service: local-user-service
      address: 127.0.0.1
      protocol: tcp
      portStart: 8080
      portEnd: 8080

    - service: account-service
      address: 10.0.1.20
      protocol: tcp
      portStart: 8081
      portEnd: 8081

    - service: fraud-service
      address: 10.0.1.30
      protocol: tcp
      portStart: 8082
      portEnd: 8082

    - service: payment-gateway
      address: 169.117.3.24
      protocol: tcp
      portStart: 443
      portEnd: 443