server:
  port: 8093

# Splunk HEC Configuration
splunk:
  hec:
    url: https://localhost:8088/services/collector
    token: a22e99ae-51de-4bff-8567-a726b83760d6             # Splunk HEC token
    index: main                             # Splunk index name
    source: gateway-service              # Source identifier
    sourcetype: _json
    enabled: true
    batch-size: 100
    flush-interval: 5000
    ssl-verify: false                      # Source type

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0



