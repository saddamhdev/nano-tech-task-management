syntax = "proto3";

option java_multiple_files = true;
option java_package = "snvn.grpc";

service AccountService {

  rpc GetAccount (AccountRequest)
      returns (AccountResponse);

  // ✅ NEW METHOD
  rpc GetAccountByEmail (AccountByEmailRequest)
      returns (AccountResponse);
}

message AccountRequest {
  int64 userId = 1;
}

// ✅ NEW REQUEST
message AccountByEmailRequest {
  string email = 1;
}

message AccountResponse {
  int64 accountId = 1;
  string status = 2;
}