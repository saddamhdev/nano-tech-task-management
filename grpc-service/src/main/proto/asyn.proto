syntax = "proto3";

option java_multiple_files = true;
option java_package = "snvn.grpc.async";

service AsyncTestService {

  // ✅ 1. Unary (async but single response)
  rpc GetStatus (StatusRequest)
      returns (StatusResponse);

  // ✅ 2. Server Streaming (multiple responses)
  rpc StreamStatus (StatusRequest)
      returns (stream StatusResponse);

  // ✅ 3. Bidirectional Streaming (full async)
  rpc Chat (stream ChatMessage)
      returns (stream ChatMessage);
}

message StatusRequest {
  int64 userId = 1;
}

message StatusResponse {
  string message = 1;
  int64 timestamp = 2;
}

message ChatMessage {
  string from = 1;
  string text = 2;
}