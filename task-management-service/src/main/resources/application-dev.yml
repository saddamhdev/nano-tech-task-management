spring:
  config:
    import:
      - "optional:classpath:splunk-hec-dev.yml"
      - "optional:classpath:redis-shared-dev.yml"
      - "optional:classpath:log-file-dev.yml"
      - "optional:classpath:application-rabbitmq-dev.yml"
      - "optional:classpath:application-kafka-dev.yml"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:6062/realms/snvn

  datasource:
    url: jdbc:h2:mem:taskdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: user-event-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

server:
  port: 8105

app:
  jwt:
    # Base64-encoded 256-bit key for local development only.
    secret: c25WTkRldk9ubHlUaGlzS2V5TXVzdEJlMzJCeXRlc0xvbmcxMjM0NTY=
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus



springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true


task-management-service-log:
  logfile:
    enabled: true
  splunk:
    enabled: false
  rabbitmq:
    enabled: false
  kafka:
    enabled: false


services:
  account-service:
    name: account-service
    base-url: http://localhost:8095

    endpoints:
      account: /api/accounts
      transaction: /api/transactions
      balance: /api/balances


grpc:
  client:
    account-service:
      address: static://localhost:9093
      negotiationType: plaintext




