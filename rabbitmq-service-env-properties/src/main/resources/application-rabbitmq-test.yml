spring:
  application:
    name: rabbitmq-service

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    template:
      default-receive-queue: rabbitmq-event-queue-test
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 2
          multiplier: 1.0

rabbitmq-service-log:
  enabled: true
  exchange: rabbitmq-log-exchange-test
  routing-key: rabbitmq-log-routing-key-test
  queue: rabbitmq-log-queue-test
  source: ${spring.application.name:rabbitmq-service}
  index: main
  sourcetype: _json

rabbitmq:
  queue:
    name: rabbitmq-event-queue-test
  exchange:
    name: rabbitmq-event-exchange-test
  routing:
    key: rabbitmq-event-routing-key-test
  dlq:
    queue:
      name: rabbitmq-event-dlq-test
    exchange:
      name: rabbitmq-event-dlq-exchange-test
    routing:
      key: rabbitmq-event-dlq-routing-key-test
  fanout:
    exchange:
      name: rabbitmq-fanout-exchange-test
    queue:
      notification: rabbitmq-fanout-notification-queue-test
      audit: rabbitmq-fanout-audit-queue-test
      analytics: rabbitmq-fanout-analytics-queue-test

server:
  port: 8098

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Environment: Test
logging:
  level:
    root: INFO
    snvn.rabbitmqservice: DEBUG
    org.springframework.amqp: INFO
    com.rabbitmq: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

